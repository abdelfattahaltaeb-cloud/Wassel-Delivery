name: Android Firebase Distribution

on:
  workflow_dispatch:
    inputs:
      app:
        description: Android app to build and distribute
        required: true
        type: choice
        options:
          - customer-app
          - driver-app
          - admin-mobile
      tester_groups:
        description: Optional comma-separated Firebase tester groups override
        required: false
        default: ""
      release_notes_suffix:
        description: Optional extra release-notes text
        required: false
        default: ""

concurrency:
  group: android-firebase-distribution-${{ github.ref }}-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  distribute-android:
    name: Distribute ${{ inputs.app }} Android
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve distribution configuration
        id: config
        env:
          CUSTOMER_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_CUSTOMER_ANDROID }}
          DRIVER_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_DRIVER_ANDROID }}
          ADMIN_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ADMIN_MOBILE_ANDROID }}
          DEFAULT_TESTER_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS_ANDROID }}
        run: |
          set -euo pipefail

          api_base_url="https://api.wassel.org.ly/api"

          case "${{ inputs.app }}" in
            customer-app)
              app_dir="apps/customer-app"
              app_name="Customer App"
              package_name="com.wassel.customer_app"
              firebase_app_id="$CUSTOMER_FIREBASE_APP_ID"
              login_path="/customer/login"
              refresh_path="/customer/refresh"
              logout_path="/customer/logout"
              ;;
            driver-app)
              app_dir="apps/driver-app"
              app_name="Driver App"
              package_name="com.wassel.driver_app"
              firebase_app_id="$DRIVER_FIREBASE_APP_ID"
              login_path="/agent/login"
              refresh_path=""
              logout_path=""
              ;;
            admin-mobile)
              app_dir="apps/admin-mobile"
              app_name="Admin Mobile"
              package_name="com.wassel.admin_mobile"
              firebase_app_id="$ADMIN_FIREBASE_APP_ID"
              login_path="/admin/login"
              refresh_path=""
              logout_path=""
              ;;
            *)
              echo "Unsupported app selection: ${{ inputs.app }}" >&2
              exit 1
              ;;
          esac

          tester_groups="${{ inputs.tester_groups }}"
          if [[ -z "$tester_groups" ]]; then
            tester_groups="$DEFAULT_TESTER_GROUPS"
          fi

          if [[ -z "$firebase_app_id" ]]; then
            echo "Missing Firebase App ID secret for ${{ inputs.app }}." >&2
            exit 1
          fi

          if [[ -z "$tester_groups" ]]; then
            echo "No tester groups supplied. Set workflow input tester_groups or FIREBASE_APP_DISTRIBUTION_GROUPS_ANDROID." >&2
            exit 1
          fi

          api_host="$(printf '%s' "$api_base_url" | sed -E 's#^[A-Za-z]+://([^/:?#]+).*#\1#' | tr '[:upper:]' '[:lower:]')"
          if [[ -z "$api_host" ]]; then
            echo "Unable to parse API host from API base URL: $api_base_url" >&2
            exit 1
          fi

          if [[ "$api_host" == "localhost" || "$api_host" == "::1" || "$api_host" == 127.* || "$api_host" == 10.* || "$api_host" == 192.168.* || "$api_host" =~ ^172\.(1[6-9]|2[0-9]|3[0-1])\. ]]; then
            echo "Distribution builds must use a reachable remote API endpoint. Refusing API base URL: $api_base_url" >&2
            exit 1
          fi

          artifact_name="${{ inputs.app }}-android-release-${GITHUB_SHA::7}"
          artifact_path="$app_dir/build/app/outputs/flutter-apk/app-release.apk"

          {
            echo "APP_DIR=$app_dir"
            echo "APP_NAME=$app_name"
            echo "PACKAGE_NAME=$package_name"
            echo "FIREBASE_APP_ID=$firebase_app_id"
            echo "TESTER_GROUPS=$tester_groups"
            echo "API_BASE_URL=$api_base_url"
            echo "LOGIN_PATH=$login_path"
            echo "REFRESH_PATH=$refresh_path"
            echo "LOGOUT_PATH=$logout_path"
            echo "ARTIFACT_NAME=$artifact_name"
            echo "ARTIFACT_PATH=$artifact_path"
          } >> "$GITHUB_ENV"

          {
            echo "app_dir=$app_dir"
            echo "app_name=$app_name"
            echo "package_name=$package_name"
            echo "firebase_app_id=$firebase_app_id"
            echo "tester_groups=$tester_groups"
            echo "api_base_url=$api_base_url"
            echo "login_path=$login_path"
            echo "refresh_path=$refresh_path"
            echo "logout_path=$logout_path"
            echo "artifact_name=$artifact_name"
            echo "artifact_path=$artifact_path"
          } >> "$GITHUB_OUTPUT"

          {
            echo "release_notes<<EOF"
            echo "App: $app_name"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            if [[ -n "${{ inputs.release_notes_suffix }}" ]]; then
              echo "Notes: ${{ inputs.release_notes_suffix }}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Validate required CI secrets
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT_EMAIL \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          signing_dir="$RUNNER_TEMP/android-signing"
          mkdir -p "$signing_dir"
          keystore_path="$signing_dir/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          cat > "$APP_DIR/android/key.properties" <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$keystore_path
          EOF

      - name: Install Flutter dependencies
        working-directory: ${{ steps.config.outputs.app_dir }}
        run: flutter pub get

      - name: Build Android release APK
        working-directory: ${{ steps.config.outputs.app_dir }}
        env:
          WASSEL_API_BASE_URL: ${{ steps.config.outputs.api_base_url }}
          WASSEL_LOGIN_PATH: ${{ steps.config.outputs.login_path }}
          WASSEL_REFRESH_PATH: ${{ steps.config.outputs.refresh_path }}
          WASSEL_LOGOUT_PATH: ${{ steps.config.outputs.logout_path }}
        run: |
          set -euo pipefail
          flutter build apk --release \
            --dart-define=WASSEL_API_BASE_URL="$WASSEL_API_BASE_URL" \
            --dart-define=WASSEL_LOGIN_PATH="$WASSEL_LOGIN_PATH" \
            --dart-define=WASSEL_REFRESH_PATH="$WASSEL_REFRESH_PATH" \
            --dart-define=WASSEL_LOGOUT_PATH="$WASSEL_LOGOUT_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.artifact_name }}
          path: ${{ steps.config.outputs.artifact_path }}
          if-no-files-found: error

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          set -euo pipefail
          firebase appdistribution:distribute "$ARTIFACT_PATH" \
            --app "$FIREBASE_APP_ID" \
            --groups "$TESTER_GROUPS" \
            --release-notes "$release_notes"

      - name: Publish workflow summary
        run: |
          {
            echo "## Android Firebase Distribution"
            echo ""
            echo "- App: $APP_NAME"
            echo "- Package: $PACKAGE_NAME"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Artifact: $ARTIFACT_NAME"
            echo "- Artifact path: $ARTIFACT_PATH"
            echo "- API base URL: $API_BASE_URL"
            echo "- Login path: $LOGIN_PATH"
            echo "- Refresh path: ${REFRESH_PATH:-<disabled>}"
            echo "- Logout path: ${LOGOUT_PATH:-<disabled>}"
            echo "- Tester groups: $TESTER_GROUPS"
            echo "- Firebase upload: completed by Firebase CLI step"
          } >> "$GITHUB_STEP_SUMMARY"