services:
  postgres:
    image: postgres:16-alpine
    container_name: wassel-delivery-postgres
    environment:
      POSTGRES_DB: wassel_delivery
      POSTGRES_USER: wassel_delivery
      POSTGRES_PASSWORD: wassel_delivery
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wassel_delivery -d wassel_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wassel-delivery-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
